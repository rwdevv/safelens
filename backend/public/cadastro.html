<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro - SafeLens</title>
</head>
<body>

<div class="header">
  <img src="logo.png" alt="Logo SafeLens">
  <span>SafeLens</span>
</div>

<div class="box">
  <h2>Criar conta</h2>

  <div class="group">
    <input id="email" type="email" placeholder="Email">
    <input id="senha" type="password" placeholder="Senha">
  </div>

  <div class="group">
    <button onclick="cadastrar()">Cadastrar</button>
    <button onclick="navegar('index.html')">Voltar</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
