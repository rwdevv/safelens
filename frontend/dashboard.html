<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard">

  <h2>SafeLens Secure Panel</h2>

  <div class="grid">

    <div class="card">
      <h3>Status</h3>
      <p>Sistema ativo ✔</p>
    </div>

    <div class="card">
      <h3>Segurança</h3>
      <p>Proteção alta 🔒</p>
    </div>

    <div class="card">
      <h3>Sessão</h3>
      <p>Usuário autenticado ✔</p>
    </div>

    <div class="card">
      <h3>Acesso</h3>
      <p>Login recente</p>
    </div>

  </div>

  <br>

  <button onclick="logout()">Sair</button>

</div>

<script>
if (!localStorage.getItem("token")) {
  window.location.href = "index.html";
}

function logout() {
  localStorage.removeItem("token");
  window.location.href = "index.html";
}
</script>

</body>
</html>
